# Local Government Activity Data
# This file contains all the local government activity data for the local government portal
# Non-technical users can easily edit this file to add, remove, or modify local government activity

categories: 
  - category: 'Elected Officials'
    slug: 'elected-officials'
    description: 'Meet your local elected officials, including the mayor, vice mayor, and councilors, with their profiles, contact information, and term details.'
    icon: 'User'
    subcategories:
      - name: 'Mayor'
        slug: 'mayor'
      - name: 'Vice Mayor'
        slug: 'vice-mayor'
      - name: 'Councilors'
        slug: 'councilors'
  - category: 'Municipal Offices'
    slug: 'municipal-offices'
    description: 'Explore local government departments, agencies, and offices with their mandates, services, and contact details.'
    icon: 'Building'
    subcategories:
      - name: 'Municipal Offices'
        slug: 'municipal-offices'
  - category: 'Barangays'
    slug: 'barangays'
    description: 'Discover information about local barangays, including their officials, demographics, and contact details.'
    icon: 'MapPin'
    subcategories:
      - name: 'Barangays'
        slug: 'barangays'

